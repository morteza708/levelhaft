app:
  name: levelhaft-test
  platform: django
  python: 3.12
  

build:
  commands:
    - pip install -r requirements.txt
    - python manage.py collectstatic --noinput

deploy:
  commands:
    - python manage.py migrate

env:
  - name: DJANGO_SECRET_KEY
    value: ${DJANGO_SECRET_KEY}
  - name: DJANGO_DEBUG
    value: "False"
  - name: ALLOWED_HOSTS
    value: "your-domain.com,www.your-domain.com"
  - name: DATABASE_URL
    value: ${DATABASE_URL}
  - name: KAVENEGAR_API
    value: ${KAVENEGAR_API}
  - name: CELERY_BROKER_URL
    value: ${REDIS_URL}
  - name: CELERY_RESULT_BACKEND
    value: ${REDIS_URL}
  - name: EMAIL_HOST
    value: smtp.gmail.com
  - name: EMAIL_PORT
    value: "587"
  - name: EMAIL_HOST_USER
    value: your-email@gmail.com
  - name: EMAIL_HOST_PASSWORD
    value: your-email-password

disk:
  name: media
  mount: /media

services:
  - name: postgres
    type: postgresql
    plan: basic
  - name: redis
    type: redis
    plan: basic 