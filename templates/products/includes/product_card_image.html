{% load static %}
<div class="product-image-wrapper{% if product.stock <= 0 %} is-unavailable-image{% endif %}">
    <a href="{% url 'products:product_detail' product.slug %}" class="product-image">
        {% if product.images.all %}
            <img src="{{ product.images.first.image.url }}" alt="{{ product.name }}">
        {% else %}
            <img src="{% static 'img/no-image.png' %}" alt="بدون تصویر">
        {% endif %}
    </a>
</div>
