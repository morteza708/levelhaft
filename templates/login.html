{% extends 'base.html' %}
{% load static %}
{% load crispy_forms_tags %}

{%block title%}
   ورود به حساب کاربری
{%endblock%}

{%block content%}
        <!-- page-title -->
        <div class="tf-page-title style-2 justify-content-center">
            <div class="container-full">
                <div class="heading text-center">ورود به حساب کاربری</div>
            </div>
        </div>
        <!-- /page-title -->

<div class="login-page">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-6 col-md-8">
                <div class="login-card">
                    <div class="login-header">
                        <div class="logo-container mb-4">
                            <img src="{% static 'images/logo/levelhaft_logo.svg' %}" alt="لوگو" class="login-logo">
                        </div>
                    </div>
                    
                    <div class="login-body">
                        <form method="post" action="{% url 'accounts:login' %}" id="login-form" class="login-form">
                            {% csrf_token %}
                            <div class="form-group mb-4">
                                <label for="id_phone_number" class="form-label mb-2">شماره موبایل</label>
                                <div class="input-group">
                                    <span class="input-group-text">
                                        <i class="fas fa-mobile-alt"></i>
                                    </span>
                                    <input type="text" name="phone_number" class="form-control" id="id_phone_number" placeholder="مثال: ۰۹۱۲۳۴۵۶۷۸۹" required>
                                </div>
                                <small class="form-text text-muted">لطفاً شماره موبایل خود را وارد کنید</small>
                            </div>
                            <div class="form-group mb-4">
                                <button type="submit" class="btn btn-login w-100">
                                    <i class="fas fa-sign-in-alt me-2"></i>
                                    دریافت کد تایید
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{%endblock%}

{% block extra_css %}
<style>
    .login-page {
        min-height: 60vh;
        display: flex;
        align-items: center;
        padding: 1rem 0;
        background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
    }

    .login-card {
        background: rgba(255, 255, 255, 0.95);
        border-radius: 15px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        padding: 2rem;
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.2);
        margin-top: 10px;
        margin-bottom: 10px;
    }

    .login-header {
        margin-bottom: 2rem;
    }

    .logo-container {
        text-align: center;
    }

    .login-logo {
        max-width: 110px;
        height: auto;
    }

    .form-label {
        color: #495057;
        font-weight: 500;
        font-size: 1rem;
    }

    .input-group {
        border-radius: 8px;
        overflow: hidden;
        border: 1px solid #dee2e6;
        transition: all 0.3s ease;
        height: 48px;
    }

    .input-group:focus-within {
        border-color: #28a745;
        box-shadow: 0 0 0 0.2rem rgba(40, 167, 69, 0.25);
    }

    .input-group-text {
        background: #f8f9fa;
        border: none;
        color: #6c757d;
        padding: 0 1rem;
    }

    .form-control {
        border: none;
        padding: 0.75rem 1rem;
        height: 100%;
        font-size: 1rem;
    }

    .form-control:focus {
        box-shadow: none;
    }

    .form-control::placeholder {
        color: #adb5bd;
        font-size: 0.9rem;
    }

    .form-text {
        font-size: 0.85rem;
        margin-top: 0.5rem;
    }

    .btn-login {
        background: #28a745;
        color: white;
        border: none;
        padding: 0.75rem;
        border-radius: 8px;
        font-weight: 500;
        transition: all 0.3s ease;
    }

    .btn-login:hover {
        background: #218838;
        transform: translateY(-2px);
    }

    @media (max-width: 768px) {
        .login-card {
            padding: 1.5rem;
        }
        
        .login-page {
            padding: 1rem 0;
        }

        .login-logo {
            max-width: 120px;
        }
    }
</style>
{% endblock %}

{% block scripts %}
<script>
    $(document).ready(function() {
        // Add animation to form elements
        $('.form-control').each(function(index) {
            $(this).css('animation-delay', (index * 0.1) + 's');
        });
    });
</script>
{% endblock %}
